<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>土日祝を除く営業日数を算出</title>
<meta name="description" content="2つの日付を入力するだけで、土日・祝日を除いた営業日数を自動計算。工期管理・契約業務に便利な無料ツール。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&family=Oswald:wght@600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --accent: #3b82f6;
    --accent2: #60a5fa;
    --success: #22c55e;
    --warn: #f59e0b;
    --danger: #ef4444;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --border: #2d3250;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'BIZ UDPGothic', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 60px;
  }

  /* 背景グリッド */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 540px;
    position: relative;
    z-index: 1;
  }

  /* ヘッダー */
  header {
    text-align: center;
    margin-bottom: 32px;
  }

  .label-tag {
    display: inline-block;
    background: rgba(59,130,246,0.15);
    border: 1px solid rgba(59,130,246,0.3);
    color: var(--accent2);
    font-size: 11px;
    letter-spacing: 0.12em;
    padding: 4px 12px;
    border-radius: 99px;
    margin-bottom: 14px;
    font-weight: 700;
  }

  h1 {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(26px, 6vw, 38px);
    letter-spacing: 0.04em;
    line-height: 1.1;
    background: linear-gradient(135deg, #e2e8f0 30%, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--text-muted);
    font-size: 13px;
  }

  /* カード */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
  }

  /* 日付入力エリア */
  .date-grid {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 12px;
    align-items: end;
    margin-bottom: 20px;
  }

  .date-group label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }

  .date-group input[type="date"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'BIZ UDPGothic', sans-serif;
    font-size: 15px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }

  .date-group input[type="date"]:focus {
    border-color: var(--accent);
  }

  /* カレンダーアイコンの色修正 */
  .date-group input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(0.7) sepia(1) saturate(3) hue-rotate(190deg);
    cursor: pointer;
  }

  .arrow-icon {
    color: var(--text-muted);
    font-size: 20px;
    padding-bottom: 10px;
    text-align: center;
  }

  /* 計算ボタン */
  .btn-calc {
    width: 100%;
    background: linear-gradient(135deg, #2563eb, #3b82f6);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'BIZ UDPGothic', sans-serif;
    font-size: 16px;
    font-weight: 700;
    padding: 14px;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: opacity 0.15s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }

  .btn-calc:hover { opacity: 0.9; }
  .btn-calc:active { transform: scale(0.98); }

  /* 結果エリア */
  .result-area {
    display: none;
    animation: fadeUp 0.3s ease;
  }

  .result-area.show { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-main {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: linear-gradient(135deg, rgba(34,197,94,0.1), rgba(59,130,246,0.1));
    border: 1px solid rgba(34,197,94,0.25);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
    text-align: center;
    flex-direction: column;
  }

  .result-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--success);
    letter-spacing: 0.12em;
  }

  .result-number {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(52px, 14vw, 80px);
    line-height: 1;
    color: #fff;
    letter-spacing: -0.02em;
  }

  .result-unit {
    font-size: 18px;
    color: var(--text-muted);
    font-weight: 700;
  }

  /* 内訳 */
  .breakdown {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }

  .breakdown-item {
    background: var(--surface2);
    border-radius: 8px;
    padding: 12px 8px;
    text-align: center;
  }

  .breakdown-item .b-num {
    font-family: 'Oswald', sans-serif;
    font-size: 22px;
    font-weight: 600;
  }

  .breakdown-item .b-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .b-total  { color: var(--text); }
  .b-weekend{ color: var(--warn); }
  .b-holiday{ color: var(--danger); }

  /* 祝日リスト */
  .holiday-section {
    background: var(--surface2);
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 16px;
    max-height: 200px;
    overflow-y: auto;
  }

  .holiday-section::-webkit-scrollbar { width: 4px; }
  .holiday-section::-webkit-scrollbar-track { background: transparent; }
  .holiday-section::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  .holiday-header {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    margin-bottom: 10px;
  }

  .holiday-list { list-style: none; }

  .holiday-list li {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 5px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    color: var(--danger);
  }

  .holiday-list li:last-child { border-bottom: none; }

  .holiday-name { color: var(--text-muted); }

  /* コピーボタン */
  .btn-copy {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'BIZ UDPGothic', sans-serif;
    font-size: 14px;
    padding: 11px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    letter-spacing: 0.04em;
  }

  .btn-copy:hover {
    background: var(--border);
    border-color: var(--accent);
  }

  /* エラー */
  .error-msg {
    display: none;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px;
    color: #fca5a5;
    font-size: 13px;
    padding: 10px 14px;
    margin-top: 12px;
  }

  .error-msg.show { display: block; }

  /* 注意書き */
  .note {
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    line-height: 1.7;
    margin-top: 8px;
  }

  /* フッター */
  footer {
    margin-top: 40px;
    text-align: center;
    font-size: 11px;
    color: #475569;
  }

  /* スマホ対応 */
  @media (max-width: 400px) {
    .date-grid {
      grid-template-columns: 1fr;
    }
    .arrow-icon { display: none; }
    .breakdown { grid-template-columns: repeat(3, 1fr); gap: 6px; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="label-tag">BUSINESS DAY CALCULATOR</div>
    <h1>営業日計算ツール</h1>
    <p class="subtitle">土日・祝日を除いた日数を自動計算</p>
  </header>

  <div class="card">
    <div class="date-grid">
      <div class="date-group">
        <label>開始日</label>
        <input type="date" id="startDate">
      </div>
      <div class="arrow-icon">→</div>
      <div class="date-group">
        <label>終了日</label>
        <input type="date" id="endDate">
      </div>
    </div>

    <button class="btn-calc" onclick="calculate()">営業日数を計算する</button>

    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="result-area" id="resultArea">
    <div class="result-main">
      <div class="result-label">営業日数（土日祝除く）</div>
      <div>
        <span class="result-number" id="resultNum">0</span>
        <span class="result-unit">日</span>
      </div>
    </div>

    <div class="breakdown">
      <div class="breakdown-item">
        <div class="b-num b-total" id="bTotal">0</div>
        <div class="b-label">総日数</div>
      </div>
      <div class="breakdown-item">
        <div class="b-num b-weekend" id="bWeekend">0</div>
        <div class="b-label">土日</div>
      </div>
      <div class="breakdown-item">
        <div class="b-num b-holiday" id="bHoliday">0</div>
        <div class="b-label">祝日</div>
      </div>
    </div>

    <div class="holiday-section" id="holidaySection" style="display:none">
      <div class="holiday-header">▶ 期間内の祝日</div>
      <ul class="holiday-list" id="holidayList"></ul>
    </div>

    <button class="btn-copy" id="copyBtn" onclick="copyResult()">📋 結果をコピー</button>
  </div>

  <p class="note">
    ※ 開始日・終了日を含む日数で計算<br>
    ※ 祝日は2020〜2030年の日本の祝日に対応<br>
    ※ 振替休日・年末年始（12/29〜1/3）も除外
  </p>
</div>

<footer>© 2025 営業日計算ツール</footer>

<script>
// ======================================
// 日本の祝日データ（固定祝日 + 年計算）
// ======================================

// 固定祝日（月/日）
const FIXED_HOLIDAYS = {
  '01-01': '元日',
  '02-11': '建国記念の日',
  '02-23': '天皇誕生日',
  '04-29': '昭和の日',
  '05-03': '憲法記念日',
  '05-04': 'みどりの日',
  '05-05': 'こどもの日',
  '08-11': '山の日',
  '11-03': '文化の日',
  '11-23': '勤労感謝の日',
};

// ハッピーマンデー（第n月曜日）
// [月, 第n週, 名称]
const HAPPY_MONDAY = [
  [1, 2, '成人の日'],
  [7, 3, '海の日'],
  [9, 3, '敬老の日'],
  [10, 2, 'スポーツの日'],
];

// 春分・秋分の計算（近似式）
function getShunbun(year) {
  const d = Math.floor(20.8431 + 0.242194 * (year - 1980) - Math.floor((year - 1980) / 4));
  return `03-${String(d).padStart(2,'0')}`;
}

function getShuubun(year) {
  const d = Math.floor(23.2488 + 0.242194 * (year - 1980) - Math.floor((year - 1980) / 4));
  return `09-${String(d).padStart(2,'0')}`;
}

// 第n月曜日を返す（1始まり）
function getNthMonday(year, month, n) {
  let count = 0;
  let d = new Date(year, month - 1, 1);
  while (true) {
    if (d.getDay() === 1) {
      count++;
      if (count === n) return d.getDate();
    }
    d.setDate(d.getDate() + 1);
  }
}

// 指定年の祝日セットを返す（YYYY-MM-DD形式のSetとMap）
function getHolidaysForYear(year) {
  const map = new Map(); // key: YYYY-MM-DD, value: 名称

  // 固定祝日
  for (const [md, name] of Object.entries(FIXED_HOLIDAYS)) {
    map.set(`${year}-${md}`, name);
  }

  // ハッピーマンデー
  for (const [month, week, name] of HAPPY_MONDAY) {
    const day = getNthMonday(year, month, week);
    const key = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    map.set(key, name);
  }

  // 春分・秋分
  map.set(`${year}-${getShunbun(year)}`, '春分の日');
  map.set(`${year}-${getShuubun(year)}`, '秋分の日');

  // 振替休日の処理
  const baseKeys = [...map.keys()].sort();
  for (const key of baseKeys) {
    const d = new Date(key);
    if (d.getDay() === 0) { // 日曜なら翌月曜
      const next = new Date(d);
      next.setDate(next.getDate() + 1);
      // 翌月曜も祝日なら翌々日まで
      let nextKey = toYMD(next);
      while (map.has(nextKey)) {
        next.setDate(next.getDate() + 1);
        nextKey = toYMD(next);
      }
      if (!map.has(nextKey)) map.set(nextKey, '振替休日');
    }
  }

  // 国民の休日（祝日に挟まれた平日）
  const allKeys = [...map.keys()].sort();
  for (let i = 0; i < allKeys.length - 1; i++) {
    const d1 = new Date(allKeys[i]);
    const d2 = new Date(allKeys[i+1]);
    const diff = (d2 - d1) / 86400000;
    if (diff === 2) {
      const between = new Date(d1);
      between.setDate(between.getDate() + 1);
      const bKey = toYMD(between);
      const dow = between.getDay();
      if (dow !== 0 && dow !== 6 && !map.has(bKey)) {
        map.set(bKey, '国民の休日');
      }
    }
  }

  return map;
}

// 年末年始（12/29〜1/3）
function isNenmatsuNenshi(dateStr) {
  const [, m, d] = dateStr.split('-').map(Number);
  if (m === 12 && d >= 29) return true;
  if (m === 1  && d <= 3)  return true;
  return false;
}

function toYMD(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth()+1).padStart(2,'0');
  const d = String(date.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}

// ======================================
// 計算メイン
// ======================================
function calculate() {
  const startVal = document.getElementById('startDate').value;
  const endVal   = document.getElementById('endDate').value;
  const errorEl  = document.getElementById('errorMsg');
  const resultEl = document.getElementById('resultArea');

  // バリデーション
  if (!startVal || !endVal) {
    showError('開始日と終了日を両方入力してください');
    resultEl.classList.remove('show');
    return;
  }

  const start = new Date(startVal);
  const end   = new Date(endVal);

  if (end < start) {
    showError('終了日は開始日以降の日付を入力してください');
    resultEl.classList.remove('show');
    return;
  }

  errorEl.classList.remove('show');

  // 祝日マップを必要な年分まとめて作る
  const startYear = start.getFullYear();
  const endYear   = end.getFullYear();
  const holidayMaps = {};
  for (let y = startYear; y <= endYear; y++) {
    holidayMaps[y] = getHolidaysForYear(y);
  }

  // 1日ずつカウント
  let totalDays   = 0;
  let weekendDays = 0;
  let holidayDays = 0;
  const hitHolidays = []; // {date, name}

  const cur = new Date(start);
  while (cur <= end) {
    totalDays++;
    const dow = cur.getDay();
    const ymd = toYMD(cur);
    const [y]  = ymd.split('-').map(Number);

    const isWeekend  = (dow === 0 || dow === 6);
    const holidayName = holidayMaps[y]?.get(ymd);
    const isHolidayFlag = !!holidayName || isNenmatsuNenshi(ymd);

    if (isWeekend) {
      weekendDays++;
    } else if (isHolidayFlag) {
      holidayDays++;
      const name = holidayName || '年末年始';
      hitHolidays.push({ date: ymd, name });
    }

    cur.setDate(cur.getDate() + 1);
  }

  // 土日と重複する祝日は weekendDaysに含まれてるので除外不要
  // ただし土日かつ祝日の日はweekendとしてカウント済み
  // → 営業日 = 総日数 - 土日 - (祝日のうち土日でないもの)
  const eigyobi = totalDays - weekendDays - holidayDays;

  // 表示
  document.getElementById('resultNum').textContent = eigyobi;
  document.getElementById('bTotal').textContent    = totalDays;
  document.getElementById('bWeekend').textContent  = weekendDays;
  document.getElementById('bHoliday').textContent  = holidayDays;

  // 祝日リスト
  const listEl = document.getElementById('holidayList');
  const secEl  = document.getElementById('holidaySection');
  listEl.innerHTML = '';

  if (hitHolidays.length > 0) {
    hitHolidays.sort((a,b)=>a.date.localeCompare(b.date));
    hitHolidays.forEach(h => {
      const li = document.createElement('li');
      const [hy,hm,hd] = h.date.split('-');
      li.innerHTML = `<span>${hy}/${hm}/${hd}</span><span class="holiday-name">${h.name}</span>`;
      listEl.appendChild(li);
    });
    secEl.style.display = 'block';
  } else {
    secEl.style.display = 'none';
  }

  resultEl.classList.add('show');

  // コピーボタン用にデータ保存
  document.getElementById('copyBtn').dataset.result =
    `【営業日計算結果】\n期間：${startVal.replace(/-/g,'/')} 〜 ${endVal.replace(/-/g,'/')}\n営業日数：${eigyobi}日\n（総日数 ${totalDays}日 ／ 土日 ${weekendDays}日 ／ 祝日 ${holidayDays}日を除く）`;
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}

function copyResult() {
  const text = document.getElementById('copyBtn').dataset.result;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    const orig = btn.textContent;
    btn.textContent = '✅ コピーしました！';
    setTimeout(() => { btn.textContent = orig; }, 2000);
  });
}

// 今日の日付をデフォルトにセット
window.addEventListener('DOMContentLoaded', () => {
  const today = new Date();
  const todayStr = toYMD(today);
  document.getElementById('startDate').value = todayStr;
  document.getElementById('endDate').value   = todayStr;
});
</script>
</body>
</html>
